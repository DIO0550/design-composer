name: frontend

on:
  pull_request:

concurrency:
  group: frontend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: lint / typecheck / test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Biome check
        run: pnpm exec biome check

      - name: oxlint
        run: pnpm exec oxlint

      # json レポーターでテスト実行時間(ファイル別 / テスト別)も計測する
      - name: Test with coverage
        run: >-
          pnpm test:coverage
          --reporter=default
          --reporter=json
          --outputFile=vitest-report.json

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: |
            coverage/
            vitest-report.json
          if-no-files-found: ignore
          retention-days: 1

  report-comment:
    name: post ci report comment
    needs: check
    if: always() && needs.check.result != 'cancelled'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      # レポート生成スクリプト(.github/scripts/)を使うため checkout する
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Download coverage artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-coverage
          path: ci-artifact

      # カバレッジ合計 + ファイル別の不足箇所(未カバー行) + テスト実行時間を
      # 1つの Markdown にまとめる。入力欠損時もフォールバック表示で続行する
      - name: Build report markdown
        run: node .github/scripts/build-frontend-report.mjs ci-artifact > coverage.md

      - name: Post report comment
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -f coverage.md ]; then
            echo "coverage.md not found; skipping"
            exit 0
          fi
          MARKER="<!-- sticky-comment: frontend-coverage -->"
          BODY=$(printf '%s\n%s' "$MARKER" "$(cat coverage.md)")
          EXISTING=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | startswith(\"$MARKER\"))][0].id // empty")
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING}" -f body="$BODY"
          else
            gh api -X POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -f body="$BODY"
          fi
